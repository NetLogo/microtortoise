name: CI

on:
  push:
  pull_request:

jobs:

  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Run JSON
        env:
          RUSTFLAGS: ""
        run: cargo run json
        working-directory: rust

  scala:
    name: Scala
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'liberica'
          java-version: 17
          java-package: jdk+fx
          cache: 'sbt'
      - uses: sbt/setup-sbt@v1
      - name: Run JSON
        run: sbt "run json"
        working-directory: scala

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "~24.13.1"
      - name: Pin npm version
        run: npm install -g "npm@~11.8.0"
      - name: Install dependencies
        run: npm install
        working-directory: typescript
      - name: Build
        run: npm run build
        working-directory: typescript

  headless:
    name: Headless NetLogo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true
      - uses: actions/setup-java@v5
        with:
          distribution: 'liberica'
          java-version: 17
          java-package: jdk+fx
          cache: 'sbt'
      - uses: sbt/setup-sbt@v1
      - name: Run headless
        run: sbt 'run "../Ants.nlogox" 1 1000'
        working-directory: headless
