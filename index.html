<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MicroTortoise Testing Page</title>
</head>

<body>

  <button id="setupButton">
    <pre>Setup</pre>
  </button>

  <button id="goButton" style="width: 60px;">
    <pre>Go</pre>
  </button>

  <button id="benchButton">
    <pre>Benchmark</pre>
  </button>

  <button id="recordButton">
    <pre>Make Recording</pre>
  </button>

  <button id="vizTSButton">
    <pre>Play Recording (TS)</pre>
  </button>

  <button id="vizScalaButton">
    <pre>Play Recording (Scala)</pre>
  </button>

  <button id="vizRustButton">
    <pre>Play Recording (Rust)</pre>
  </button>

  <div id="view-container" style="height: 600px; width: 600px;"></div>

  <!-- `ViewController` needs this for `tortoise_require` -->
  <script src="http://localhost:9000/netlogo-engine.js"></script>;

  <script type="module">

    import ViewController from "http://localhost:9000/assets/javascripts/target/coffee-output/main/beak/widgets/draw/view-controller.js";

    import "./typescript/resources/mtf.js";
    import { setup, go, Updater } from "./typescript/dist/src/model.js";

    const viewWidget = {
      fontSize: 11,
      dimensions: {
        maxPxcor: 35,
        maxPycor: 35,
        minPxcor: -35,
        minPycor: -35,
        patchSize: 7,
        wrappingAllowedInX: false,
        wrappingAllowedInY: false,
      },
    };

    const container      = document.getElementById("view-container");
    const viewController = new ViewController(container, viewWidget);
    const initialState   = Updater.drain();
    viewController.update(initialState);

    let tickCount = 0;

    function onSetup() {
      tickCount = 0;
      setup();
      viewController.update(Updater.drain());
    }

    function onGo() {

      let lastTime  = 0;

      const f =
        (timestamp) => {
          const delta = timestamp - lastTime;
          lastTime    = timestamp;
          go();
          viewController.update(Updater.drain());
          if (tickCount++ < 1000) {
            requestAnimationFrame(f);
          }
        };

      requestAnimationFrame(f);

    }

    function onBench() {
      const startTime = performance.now();
      for (let i = 0; i < 20; i++) {
        Updater.turtles = {};
        Updater.patches = {};
        Updater.world   = {};
        RNG.setSeed(1234);
        setup();
        for (let x = 0; x < 1000; x++) {
          go();
        }
      }
      const endTime = performance.now();
      alert(endTime - startTime);
    }

    async function onViz(path) {

      const response = await fetch(path);
      const arr      = await response.json();

      const f =
        (timestamp) => {
          if (arr.length > 0) {
            viewController.update(arr.shift());
            requestAnimationFrame(f);
          }
        };

      requestAnimationFrame(f);

    }

    async function onVizTS() {
      await onViz("/microtortoise-data.json");
    }

    async function onVizScala() {
      await onViz("/microtortoise-data-scala.json");
    }

    async function onVizRust() {
      await onViz("/microtortoise-data-rust.json");
    }

    function onRecord() {

      const output = [initialState];

      setup();
      output.push(Updater.drain());

      for (let i = 0; i < 1000; i++) {
        go();
        output.push(Updater.drain());
      }

      const text = JSON.stringify(output, null, 2);
      const blob = new Blob([text], { type: "text/plain" });
      const url  = URL.createObjectURL(blob);

      const a    = document.createElement("a");
      a.href     = url;
      a.download = "microtortoise-data.json";

      document.body.appendChild(a);
      a.click();
      a.remove();

      URL.revokeObjectURL(url);

    }

    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById(   "setupButton").addEventListener("click", onSetup   );
      document.getElementById(      "goButton").addEventListener("click", onGo      );
      document.getElementById(   "benchButton").addEventListener("click", onBench   );
      document.getElementById(  "recordButton").addEventListener("click", onRecord  );
      document.getElementById(   "vizTSButton").addEventListener("click", onVizTS   );
      document.getElementById("vizScalaButton").addEventListener("click", onVizScala);
      document.getElementById( "vizRustButton").addEventListener("click", onVizRust );
    });

  </script>
</body>

</html>
